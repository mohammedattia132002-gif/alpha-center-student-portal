<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background for preview context (can be removed if total transparency is needed) -->
  <rect width="1024" height="1024" fill="#1A1B23"/>
  
  <defs>
    <!-- Main Gradient for Alpha Shape -->
    <linearGradient id="AlphaGradient" x1="200" y1="300" x2="800" y2="800" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#FF1CFF" /> <!-- Vibrant Pink/Magenta -->
        <stop offset="40%" stop-color="#9817FF" /> <!-- Purple -->
        <stop offset="100%" stop-color="#3612FF" /> <!-- Electric Blue -->
    </linearGradient>
    
    <!-- Subtle Inner Glow / Highlights -->
    <linearGradient id="HighlightGrad" x1="400" y1="200" x2="600" y2="500" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="white" stop-opacity="0.4" />
        <stop offset="100%" stop-color="white" stop-opacity="0" />
    </linearGradient>

    <!-- Drop Shadow / Depth -->
    <filter id="SoftGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="25" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g filter="url(#SoftGlow)">
    <!-- Stylized Alpha (α) Shape - Simplified for clean vector but inspired by the high-end image -->
    <path d="M720,250 
             C650,250 550,450 512,530 
             C470,610 350,800 250,810 
             C180,815 120,750 150,650 
             C180,550 250,300 450,250 
             C550,230 650,300 700,450 
             C750,600 800,800 850,820 
             C820,850 750,850 720,800 
             C680,750 600,550 512,530 
             C450,520 280,550 240,650 
             C200,750 250,800 320,800 
             C450,800 650,450 720,250 Z" 
          fill="url(#AlphaGradient)" />
    
    <!-- Inner Highlight for Glass Effect -->
    <path d="M450,265 C520,250 630,300 670,420" stroke="url(#HighlightGrad)" stroke-width="15" stroke-linecap="round" fill="none" opacity="0.6"/>
  </g>

  <!-- Premium Typography: ALPHA CENTER -->
  <text x="512" y="940" font-family="Arial, Helvetica, sans-serif" font-size="90" font-weight="900" 
        fill="white" text-anchor="middle" letter-spacing="15" style="filter: drop-shadow(0px 5px 10px rgba(0,0,0,0.5))">
    ALPHA CENTER
  </text>
  
  <!-- Subtle Arabic Text if needed (Optional, added for 'Alpha Center' identity) -->
  <!-- <text x="512" y="1000" font-family="Arial" font-size="40" fill="#9817FF" text-anchor="middle">مركز ألفـا</text> -->
</svg>
